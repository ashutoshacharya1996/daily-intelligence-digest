name: Build and publish daily digest

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build digest and website
        run: python digest.py --hours 30 --site-dir docs
      - name: Save dated archive
        run: |
          git config user.name "daily-digest-bot"
          git config user.email "actions@github.com"
          git add -f docs/archive
          git diff --cached --quiet || git commit -m "Archive daily digest"
          git push
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
